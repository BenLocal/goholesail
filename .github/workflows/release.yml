name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: build & publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build release archives
        run: |
          set -euo pipefail
          mkdir -p dist
          for target in linux/amd64 linux/arm64; do
            os="${target%/*}"; arch="${target#*/}"
            echo "building $os/$arch"
            CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" \
              go build -trimpath -ldflags="-s -w" -o "dist/goholesail" ./cmd/goholesail
            tar -C dist -czf "dist/goholesail_${os}_${arch}.tar.gz" goholesail
            rm dist/goholesail
          done
          ( cd dist && sha256sum goholesail_*.tar.gz > checksums.txt )
          ls -l dist

      - name: Publish GitHub Release
        # Only publish on a version tag. A workflow_dispatch from a branch still
        # builds/packages (a useful dry run) but must NOT create a release/tag
        # named after the branch.
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" dist/* --generate-notes
