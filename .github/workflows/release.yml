name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: build & publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build binaries & archives
        run: |
          set -euo pipefail
          mkdir -p dist
          for target in linux/amd64 linux/arm64; do
            os="${target%/*}"; arch="${target#*/}"
            echo "building $os/$arch"
            mkdir -p "img/${os}/${arch}"
            CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" \
              go build -trimpath -ldflags="-s -w" -o "img/${os}/${arch}/goholesail" ./cmd/goholesail
            tar -C "img/${os}/${arch}" -czf "dist/goholesail_${os}_${arch}.tar.gz" goholesail
          done
          ( cd dist && sha256sum goholesail_*.tar.gz > checksums.txt )
          ls -lR dist img

      - name: Publish GitHub Release
        # Only publish on a version tag. A workflow_dispatch from a branch still
        # builds/packages (a useful dry run) but must NOT create a release/tag
        # named after the branch.
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" dist/* --generate-notes

      - name: Set up Docker Buildx
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        if: startsWith(github.ref, 'refs/tags/v')
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          # Requires a full semver tag (vX.Y.Z). A non-semver v* tag (e.g. v1 or
          # vtest) emits no tag here and fails the push step. latest=auto tags
          # :latest only for a stable release (a -rc/-pre tag won't clobber it).
          tags: |
            type=semver,pattern=v{{version}}
          flavor: |
            latest=auto

      - name: Build & push multi-arch image
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.release
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
